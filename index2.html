<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABUT BTW SELAMAT YANG ULTAH</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 350px;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            position: relative;
            overflow: visible;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .display {
            background: #222;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .display-text {
            color: #0f0;
            font-family: monospace;
            font-size: 28px;
            letter-spacing: 8px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .key {
            padding: 15px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #eee;
            font-weight: bold;
            transition: 0.2s;
        }

        .key:active {
            background: #ccc;
            transform: scale(0.95);
        }

        .key-enter {
            background: #4CAF50;
            color: white;
            grid-column: span 2;
        }

        .key-clear {
            background: #f44336;
            color: white;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        /* Halaman 2 */
        #page2 {
            display: none;
            text-align: center;
            position: relative;
            padding-top: 10px;
        }

        .kue {
            font-size: 80px;
            animation: bounce 1s infinite;
            margin-bottom: 10px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .nama {
            color: #9c27b0;
            font-size: 32px;
            font-weight: bold;
            margin: 5px 0;
            animation: pulse 2s infinite;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .ucapan {
            color: #e91e63;
            font-size: 22px;
            font-weight: bold;
            margin: 8px 0;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px #e91e63; }
            50% { text-shadow: 0 0 20px #ff69b4, 0 0 30px #ff69b4; }
        }

        .ulangtahun {
            color: #333;
            font-size: 20px;
            margin: 5px 0;
            font-weight: bold;
        }

        .ucapan-kata {
            color: #666;
            font-size: 14px;
            margin: 10px 0 15px 0;
            font-style: italic;
            line-height: 1.5;
        }

        .detail {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .detail p {
            margin: 5px 0;
            color: #444;
            font-weight: bold;
            font-size: 15px;
        }

        .btn-reset {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-reset:hover {
            background: #1976D2;
        }

        .emoji-row {
            margin: 15px 0;
            font-size: 30px;
        }

        .emoji-row span {
            display: inline-block;
            animation: wiggle 1s infinite;
        }

        .emoji-row span:nth-child(2) { animation-delay: 0.2s; }
        .emoji-row span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        /* Balloon */
        .balloon {
            position: absolute;
            width: 50px;
            height: 65px;
            border-radius: 50% 50% 50% 50%;
            z-index: 1;
        }

        .balloon::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 20px;
            background: #666;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .balloon-1 {
            top: -45px;
            left: -10px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            animation: balloon-float-1 3s ease-in-out infinite;
        }

        .balloon-2 {
            top: -35px;
            right: -10px;
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            animation: balloon-float-2 3.5s ease-in-out infinite;
        }

        .balloon-3 {
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            animation: balloon-float-3 4s ease-in-out infinite;
        }

        @keyframes balloon-float-1 {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        @keyframes balloon-float-2 {
            0%, 100% { transform: translateY(0) rotate(5deg); }
            50% { transform: translateY(-10px) rotate(-5deg); }
        }

        @keyframes balloon-float-3 {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-12px); }
        }

        /* Confetti */
        .confetti-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1000;
            display: none;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -20px;
        }

        .confetti-piece.animate {
            animation: confetti-fall 3s linear forwards;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="confetti-wrapper" id="confetti-wrapper"></div>

    <div class="container">
        <!-- Halaman 1: Sandi -->
        <div id="page1">
            <h1>🔐 Sandi Ultah</h1>
            
            <div class="display">
                <div class="display-text" id="display">_ _ _ _</div>
            </div>
            
            <div class="keypad">
                <button class="key" onclick="ketik('1')">1</button>
                <button class="key" onclick="ketik('2')">2</button>
                <button class="key" onclick="ketik('3')">3</button>
                <button class="key" onclick="ketik('4')">4</button>
                <button class="key" onclick="ketik('5')">5</button>
                <button class="key" onclick="ketik('6')">6</button>
                <button class="key" onclick="ketik('7')">7</button>
                <button class="key" onclick="ketik('8')">8</button>
                <button class="key" onclick="ketik('9')">9</button>
                <button class="key key-clear" onclick="hapus()">C</button>
                <button class="key" onclick="ketik('0')">0</button>
                <button class="key key-enter" onclick="masuk()">MASUK</button>
            </div>
            
            <div class="error" id="error">❌ Sandi salah!</div>
        </div>
        
        <!-- Halaman 2: Selamat -->
        <div id="page2">
            <!-- Balloons -->
            <div class="balloon balloon-1"></div>
            <div class="balloon balloon-2"></div>
            <div class="balloon balloon-3"></div>
            
            <div class="kue">🎂</div>
            <div class="nama">RACHEL</div>
            <div class="ucapan">🎉 HAPPY BIRTHDAY! 🎉</div>
            <div class="ulangtahun">Selamat Ulang Tahun ke-16</div>
            
            <div class="ucapan-kata">
                "Semoga sehat selalu dan tetap semangatt hwh",<br>
            </div>
            
            <div class="detail">
                <p>🎈 pokok nya tetap semangat lah 💜</p>
                <p>✨ sayo ndakiiiiiiiiiii ⭐</p>
            </div>
            
            <div class="emoji-row">
                <span>🎁</span>
                <span>🎈</span>
                <span>🎉</span>
            </div>
            
            <br>
            <button class="btn-reset" onclick="reset()">🔄 Coba Lagi</button>
        </div>
    </div>

    <script>
        let sandi = "";
        const benar = "1206";
        
        function ketik(angka) {
            if (sandi.length < 4) {
                sandi += angka;
                update();
            }
        }
        
        function update() {
            let teks = sandi + "_".repeat(4 - sandi.length);
            document.getElementById("display").innerText = teks;
        }
        
        function hapus() {
            sandi = "";
            update();
            document.getElementById("error").style.display = "none";
        }
        
        function masuk() {
            if (sandi === benar) {
                document.getElementById("page1").style.display = "none";
                document.getElementById("page2").style.display = "block";
                buatConfetti();
            } else {
                document.getElementById("error").style.display = "block";
                sandi = "";
                update();
            }
        }
        
        function reset() {
            sandi = "";
            document.getElementById("page2").style.display = "none";
            document.getElementById("page1").style.display = "block";
            update();
            document.getElementById("error").style.display = "none";
        }
        
        function buatConfetti() {
            const wrapper = document.getElementById("confetti-wrapper");
            wrapper.style.display = "block";
            
            const warna = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ff9a9e'];
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    let confetti = document.createElement("div");
                    confetti.className = "confetti-piece";
                    confetti.style.left = Math.random() * 100 + "vw";
                    confetti.style.background = warna[Math.floor(Math.random() * warna.length)];
                    confetti.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + "s";
                    wrapper.appendChild(confetti);
                    
                    setTimeout(() => confetti.classList.add("animate"), 10);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }
    </script>
</body>
</html>
